# Teacher Copilot runs with NO Docker.
#
# Qdrant runs in embedded local mode (QDRANT_MODE=embedded), in-process on disk at
# QDRANT_PATH — no server, no compose, no daemon. This is the default and the only
# mode the code exercises today.
#
# Server mode is an optional deployment choice (QDRANT_MODE=server + QDRANT_URL). If
# you want a standalone Qdrant with its dashboard, run the official image directly:
#
#   docker run -p 6333:6333 -p 6334:6334 -v "$PWD/qdrant_storage:/qdrant/storage" \
#       qdrant/qdrant:latest
#
# Langfuse (Phase 7 observability) will bring its own compose when wired in; see the
# official self-host stack: https://github.com/langfuse/langfuse
